spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/countin_db
    username: ${DB_USERNAME:postgres}
    password: Admin@123
    hikari:
      pool-name: CountInHikariPool
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    show-sql: true

  flyway:
    clean-disabled: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.flywaydb: info
