spring:
  application:
    name: countin-backend

  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

countin:
  jwt:
    secret: ${JWT_SECRET:countin-dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  otp:
    mvp-code: "123456"
